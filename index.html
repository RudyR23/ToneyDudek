<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toney Dudek: Daily Sequences</title>
    <style>
        :root {
            --dark-blue: #0b1a3a;
            --body-bg: radial-gradient(circle at bottom left, #bce3ff 0%, #295ca6 45%, #0a1833 100%);
            --panel-bg: rgba(14, 30, 61, 0.85);
            --light-blue: #89c5f7; 
            --accent-glow: rgba(137, 197, 247, 0.3);
            --grey-text: #96b4db;
            --muted-grey: #3b5680;
            --off-white: #e2f0fd;
            --card-inactive: rgba(21, 44, 87, 0.9);
            --pure-white: #ffffff;
            --points-orange: #ff8c00; 
            --steel-blue: #255294; 
            --answer-highlight: #7dd3fc;
            --success-green: #10b981;
            --alert-red: #ef4444;
            --purple-alt: #a855f7;
            --seq-badge-blue: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: var(--body-bg);
            color: var(--pure-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-overlay {
            width: 100%;
            max-width: 900px;
            min-height: 540px; 
            background-color: var(--panel-bg);
            border: 2px solid rgba(137, 197, 247, 0.25);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 2px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .game-inner-border {
            border: 1px solid rgba(137, 197, 247, 0.2);
            border-radius: 10px;
            padding: 22px 25px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .game-header {
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: var(--grey-text);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(137, 197, 247, 0.15);
        }

        .game-title {
            display: flex;
            align-items: center;
        }
        
        .game-logo-img {
            height: 32px;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        .clock-wrapper-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clock-prepend-text {
            color: var(--pure-white);
            font-weight: bold;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-clock-box {
            background-color: var(--dark-blue);
            border: 1px solid var(--seq-badge-blue);
            color: var(--seq-badge-blue);
            font-weight: bold;
            font-size: 0.75rem;
            padding: 1px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 22px;
            font-family: monospace;
        }

        .glow-red { animation: redPulse 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glow-green { animation: greenPulse 1.2s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes redPulse {
            0% { border-color: var(--alert-red); box-shadow: 0 0 14px rgba(239, 68, 68, 0.9); }
            100% { border-color: rgba(137, 197, 247, 0.4); box-shadow: none; }
        }

        @keyframes greenPulse {
            0% { border-color: var(--success-green); box-shadow: 0 0 14px rgba(16, 185, 129, 0.9); }
            100% { border-color: rgba(137, 197, 247, 0.4); box-shadow: none; }
        }

        .orange-score-text { color: var(--points-orange); }
        .green-rule-text { color: var(--success-green); }
        .red-rule-text { color: var(--alert-red); }

        .meta-sub-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            height: 22px;
            position: relative;
            top: 15px; 
            z-index: 10;
        }

        .meta-left-badges {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            width: 100%;
        }

        .meta-left-inner-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .seq-badge-box {
            background-color: rgba(56, 189, 248, 0.15);
            border: 1px solid var(--seq-badge-blue);
            color: var(--seq-badge-blue);
            font-weight: bold;
            font-size: 0.75rem;
            padding: 1px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
            height: 22px;
            display: flex;
            align-items: center;
        }

        .alt-badge-box {
            background-color: rgba(168, 85, 247, 0.15);
            border: 1px solid var(--purple-alt);
            color: var(--purple-alt);
            font-weight: bold;
            font-size: 0.75rem;
            padding: 1px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            height: 22px;
            display: flex;
            align-items: center;
        }

        .header-score-box {
            background-color: rgba(16, 37, 82, 0.85);
            border: 1px solid rgba(137, 197, 247, 0.4);
            color: var(--pure-white);
            font-weight: bold;
            font-size: 0.75rem;
            padding: 1px 6px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            flex-grow: 1;
            padding-top: 15px;
        }

        .clues-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            row-gap: 18px; 
            column-gap: 15px;
            margin-top: 25px; 
            margin-bottom: 5px;
        }

        .clue-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .clues-container > .clue-wrapper:nth-child(1),
        .clues-container > .clue-wrapper:nth-child(2) {
            position: relative;
            top: -3px;
        }

        .clues-container > .clue-wrapper:nth-child(3),
        .clues-container > .clue-wrapper:nth-child(4) {
            position: relative;
            top: -15px;
        }

        .clue-card {
            background-color: var(--card-inactive);
            border: 1px solid rgba(137, 197, 247, 0.15); 
            border-radius: 8px;
            height: 112px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
            color: var(--grey-text);
            position: relative;
            overflow: hidden;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4);
        }

        .clue-card.revealed {
            background-color: var(--steel-blue);
            color: var(--pure-white);
            box-shadow: 4px 4px 15px var(--accent-glow);
            border: 1px solid var(--light-blue);
            font-weight: 700;
        }

        .hint-text-wrapper {
            font-size: 0.95rem;
            font-weight: 700;
            width: 100%;
            word-wrap: break-word;
            z-index: 5;
        }

        .club-sub-line {
            display: block;
            font-size: 0.8rem;
            color: #b0d4ff;
            font-weight: normal;
            margin-top: 4px;
        }

        .alt-clue-span {
            font-weight: normal; 
            font-size: 0.9rem; 
            color: var(--grey-text);
        }

        .clue-placeholder {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--grey-text);
            letter-spacing: 1.5px;
            z-index: 5;
        }

        .card-qm {
            position: absolute;
            color: var(--light-blue);
            font-weight: bold;
            user-select: none;
            pointer-events: none;
            line-height: 1;
            z-index: 1;
        }

        .card-inline-metric {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--light-blue); 
            margin-top: 6px;
            z-index: 5;
        }

        .reveal-btn {
            margin-top: 6px;
            background: transparent;
            border: 1px solid var(--light-blue);
            color: var(--light-blue);
            padding: 5px 10px;
            height: 28px;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .reveal-btn:hover:not(:disabled) {
            background: var(--light-blue);
            color: var(--dark-blue);
            box-shadow: 0 0 10px var(--light-blue);
        }

        .reveal-btn:disabled {
            border-color: var(--muted-grey);
            color: var(--muted-grey);
            cursor: not-allowed;
            box-shadow: none;
        }

        .card-input-element {
            background-color: rgba(5, 12, 28, 0.6);
            border: 1px solid var(--light-blue);
            color: var(--pure-white);
            padding: 5px 10px;
            height: 28px;
            font-size: 0.8rem;
            border-radius: 4px;
            outline: none;
            width: 100%;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .card-input-element::placeholder {
            color: var(--light-blue);
            opacity: 0.8;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .card-input-element:disabled {
            cursor: not-allowed;
        }

        .card-input-element.state-correct {
            border-color: var(--success-green) !important;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6) !important;
            color: var(--success-green) !important;
            background-color: rgba(16, 185, 129, 0.1) !important;
            font-size: 0.75rem !important;
            text-transform: uppercase;
        }

        .card-input-element.state-incorrect {
            border-color: var(--alert-red) !important;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.6) !important;
            color: var(--alert-red) !important;
            background-color: rgba(239, 68, 68, 0.1) !important;
            font-size: 0.75rem !important;
            text-transform: uppercase;
        }

        .square-submit-btn {
            background: transparent;
            border: 1px solid var(--light-blue);
            color: var(--light-blue);
            height: 28px;
            width: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .square-submit-btn:hover:not(:disabled) {
            background: var(--light-blue);
            color: var(--dark-blue);
            box-shadow: 0 0 10px var(--light-blue);
        }

        .square-submit-btn:disabled {
            border-color: var(--muted-grey);
            color: var(--muted-grey);
            cursor: not-allowed;
            box-shadow: none;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            position: relative;
            top: -22px; 
            height: calc(100% + 22px);
            min-height: 420px;
            max-height: 420px;
        }

        .input-box-wrapper {
            background-color: var(--card-inactive);
            border: 1px solid rgba(137, 197, 247, 0.15);
            border-radius: 8px;
            padding: 16px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.4);
        }

        .inline-feedback-container {
            background-color: rgba(5, 12, 28, 0.6);
            border: 1px solid rgba(137, 197, 247, 0.15);
            border-radius: 6px;
            padding: 14px;
            font-size: 0.95rem;
            color: var(--off-white);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            flex: 1; 
            height: 100%;
            min-height: 100%;
            max-height: 100%;
            overflow-y: auto; 
            position: relative;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4);
        }

        .top-nav-buttons-group {
            position: absolute;
            top: 10px;
            right: 12px;
            display: flex;
            gap: 6px;
            z-index: 100;
        }

        .help-toggle-btn, .ans-toggle-btn, .stats-toggle-btn {
            background: rgba(137, 197, 247, 0.2);
            border: 1px solid var(--light-blue);
            color: var(--light-blue);
            border-radius: 4px;
            width: 26px;
            height: 26px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .help-toggle-btn:hover:not(:disabled), .ans-toggle-btn:hover:not(:disabled), .stats-toggle-btn:hover:not(:disabled) {
            background: var(--light-blue);
            color: var(--dark-blue);
        }
        
        .stats-toggle-btn:hover:not(:disabled) .bar-icon {
            background: var(--dark-blue);
        }

        .help-toggle-btn.active-nav, .ans-toggle-btn.active-nav, .stats-toggle-btn.active-nav {
            background: var(--light-blue);
            color: var(--dark-blue);
            box-shadow: 0 0 8px var(--light-blue);
        }

        .stats-toggle-btn.active-nav .bar-icon {
            background: var(--dark-blue);
        }

        .ans-toggle-btn:disabled, .stats-toggle-btn:disabled {
            border-color: var(--muted-grey) !important;
            color: var(--muted-grey) !important;
            background: transparent !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
        }
        
        .stats-toggle-btn:disabled .bar-icon {
            background: var(--muted-grey) !important;
        }

        .bar-icon-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2px;
            width: 14px;
            height: 12px;
        }

        .bar-icon {
            width: 2px;
            background: #ffffff;
            border-radius: 1px;
            transition: background 0.2s;
        }

        .stats-toggle-btn:not(.active-nav) .bar-icon {
            background: var(--light-blue);
        }

        .feedback-title {
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-right: 95px; 
        }
        
        .feedback-title.win { color: #10b981; }
        .feedback-title.lose { color: #ef4444; }
        .feedback-title.alert { color: #eab308; }
        .feedback-title.info { color: #7dd3fc; }
        .feedback-title.summary { color: #7dd3fc; }

        .feedback-msg {
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .rules-bullet-list {
            list-style-type: disc;
            margin-left: 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 0px;
        }

        .section-header-pill {
            font-weight: 700;
            text-transform: uppercase;
            color: #f8fafc;
            font-size: 0.75rem;
            margin-top: 4px;
            background-color: rgba(137, 197, 247, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            align-self: flex-start;
            width: max-content;
        }

        .feedback-reveal-text {
            font-weight: normal;
            font-size: 1.65rem; 
            color: var(--answer-highlight);
            margin-top: 4px;
            line-height: 1.2;
            font-family: inherit;
        }

        .feedback-secondary-reveal {
            font-size: 0.88rem;
            font-weight: normal;
            color: var(--grey-text);
            margin-top: 2px;
            margin-bottom: 4px;
            font-family: inherit;
        }

        #fb-explanation-text {
            font-weight: 700;
            color: var(--pure-white);
            margin-top: 4px;
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .highlighted-explanation-span {
            color: var(--answer-highlight);
        }

        .continue-stats-panel-btn {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid var(--seq-badge-blue);
            color: var(--seq-badge-blue);
            border-radius: 6px;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            margin: 12px auto 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
        }

        .continue-stats-panel-btn:hover {
            background: var(--seq-badge-blue);
            color: var(--dark-blue);
        }

        .continue-stats-panel-btn:hover .bar-icon {
            background: var(--dark-blue);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 6px;
            margin-bottom: 8px;
        }

        .stat-box {
            background: rgba(16, 37, 82, 0.6);
            border: 1px solid rgba(137, 197, 247, 0.2);
            border-radius: 6px;
            padding: 8px 4px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--points-orange);
            line-height: 1.1;
        }

        .stat-lbl {
            font-size: 0.68rem;
            text-transform: uppercase;
            color: var(--grey-text);
            margin-top: 3px;
        }

        .share-btn {
            background-color: var(--purple-alt);
            color: var(--pure-white);
            border: none;
            border-radius: 4px;
            height: 24px;
            padding: 0 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 6px;
            font-size: 0.75rem;
            width: 100%;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .share-btn:hover {
            background-color: #9333ea;
        }

        .credits-signature {
            position: absolute;
            bottom: 12px;
            right: 12px;
            font-size: 0.7rem;
            color: var(--muted-grey);
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .footer-links-container {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            gap: 15px;
        }

        .footer-text-link {
            font-family: inherit !important;
            text-decoration: none !important;
            color: var(--grey-text);
            font-size: 0.7rem;
            font-weight: bold;
            transition: color 0.2s ease;
        }

        .footer-text-link:hover {
            color: var(--light-blue);
            text-decoration: underline !important;
        }

        .dev-sandbox-toolbox {
            display: none;
            margin-top: 20px;
            width: 100%;
            max-width: 900px;
            background: rgba(20, 20, 30, 0.9);
            border: 2px dashed #f59e0b;
            border-radius: 8px;
            padding: 15px;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            position: relative;
        }

        .dev-close-btn {
            position: absolute;
            top: 10px;
            right: 12px;
            cursor: pointer;
            color: #ef4444;
            font-weight: bold;
            font-size: 1.2rem;
            line-height: 1;
            user-select: none;
        }

        .dev-title {
            color: #f59e0b;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: -5px;
        }

        .dev-btn {
            background: #f59e0b;
            color: #000;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .dev-btn:hover { background: #d97706; }

        .dev-select {
            background: #27272a;
            color: #fff;
            border: 1px solid #f59e0b;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .game-overlay {
                height: auto;
                min-height: auto;
            }
            .meta-sub-row {
                display: flex;
                flex-direction: column;
                height: auto;
                top: 0;
                margin-top: 10px;
            }
            .game-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                padding-top: 10px;
            }
            .clues-container {
                margin-top: 10px;
            }
            .clues-container > .clue-wrapper:nth-child(1),
            .clues-container > .clue-wrapper:nth-child(2),
            .clues-container > .clue-wrapper:nth-child(3),
            .clues-container > .clue-wrapper:nth-child(4) {
                top: 0 !important;
            }
            .control-panel {
                top: 0;
                height: auto;
                min-height: auto;
                max-height: none;
                margin-bottom: 25px;
            }
            .input-box-wrapper {
                min-height: 240px;
                height: auto;
            }
            .inline-feedback-container {
                min-height: 200px;
                height: auto;
                max-height: none;
                overflow-y: visible;
            }
            .credits-signature {
                position: static;
                text-align: center;
                margin-top: 15px;
                margin-bottom: 5px;
            }
            .footer-links-container {
                position: static;
                justify-content: center;
                margin-top: 10px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="game-overlay" id="game-border-element">
        <div class="game-inner-border">
            
            <div class="game-header">
                <div class="game-title">
                    <img src="/logo.png" alt="Toney Dudek Logo" class="game-logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span style="display:none; font-weight:bold; color:var(--pure-white); font-size:1.1rem; letter-spacing:0.5px;">TONEY DUDEK</span>
                </div>
                <div class="clock-wrapper-container">
                    <span class="clock-prepend-text" id="clock-label-text">Next Sequence</span>
                    <div class="header-clock-box" id="game-timer-display">00:00:00</div>
                </div>
            </div>

            <div class="meta-sub-row">
                <div class="meta-left-badges">
                    <div class="meta-left-inner-group">
                        <div class="seq-badge-box" id="header-q-idx">Sequence #--</div>
                        <div class="alt-badge-box" id="alt-question-badge" style="display: none;">ALT</div>
                    </div>
                    <div class="header-score-box">
                        Score:&nbsp;<span class="orange-score-text" id="header-score-value">100</span>
                    </div>
                </div>
                <div></div>
            </div>

            <div class="game-grid">
                
                <div class="clues-container">
                    <div class="clue-wrapper">
                        <div class="clue-card" id="card-0"><span class="clue-placeholder">CLUE 1</span></div>
                        <button class="reveal-btn" id="rev-btn-0" onclick="triggerManualReveal(0)">Reveal</button>
                    </div>
                    <div class="clue-wrapper">
                        <div class="clue-card" id="card-1"><span class="clue-placeholder">CLUE 2</span></div>
                        <button class="reveal-btn" id="rev-btn-1" onclick="triggerManualReveal(1)">Reveal</button>
                    </div>
                    <div class="clue-wrapper">
                        <div class="clue-card" id="card-2"><span class="clue-placeholder">CLUE 3</span></div>
                        <button class="reveal-btn" id="rev-btn-2" onclick="triggerManualReveal(2)">Reveal</button>
                    </div>
                    <div class="clue-wrapper">
                        <div class="clue-card" id="card-3"></div>
                        <div style="display: flex; gap: 6px; margin-top: 6px; width: 100%;">
                            <input type="text" class="card-input-element" id="game-input" placeholder="enter answer here" autocomplete="off" onkeydown="handleInputBoxKeydown(event)" onmousedown="clearInputStateGlow()" disabled style="flex-grow: 1;">
                            <button class="square-submit-btn" id="submit-btn" onclick="processGuess()" disabled>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="9 10 4 15 9 20"></polyline>
                                    <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="control-panel">
                    <div class="input-box-wrapper">
                        <div class="inline-feedback-container" id="feedback-panel">
                            
                            <div class="top-nav-buttons-group">
                                <button class="help-toggle-btn" id="help-toggle-action" onclick="switchPanelTab('help')" title="How to Play">?</button>
                                <button class="ans-toggle-btn" id="ans-toggle-action" onclick="switchPanelTab('answers')" title="View Answer" disabled>A</button>
                                <button class="stats-toggle-btn" id="stats-toggle-action" onclick="switchPanelTab('stats')" title="View Stats" disabled>
                                    <div class="bar-icon-wrapper" id="bar-icon-container"></div>
                                </button>
                            </div>

                            <div id="panel-content-area" style="display: flex; flex-direction: column; height:100%; justify-content: flex-start;">
                                <div class="feedback-title" id="fb-title">How To Play</div>
                                <div class="feedback-msg" id="fb-msg"></div>
                            </div>

                        </div>
                    </div>
                </div>

            </div>

            <div class="footer-links-container">
                <a href="https://x.com/ToneyDudek" target="_blank" class="footer-text-link">Twitter/X</a>
                <a href="https://paypal.me/tgdmrd" target="_blank" class="footer-text-link">Buy me a coffee</a>
            </div>
            
            <div class="credits-signature" onclick="toggleSandboxDevToolboxMenu()">rudyr23</div>

        </div>
    </div>

    <div class="dev-sandbox-toolbox" id="dev-sandbox-element">
        <div class="dev-close-btn" onclick="toggleSandboxDevToolboxMenu()">×</div>
        <div class="dev-title">Developer Sandbox Tool Environment</div>
        <button class="dev-btn" onclick="devResetTodayLockout()">Reset Completion Locks</button>
        <select class="dev-select" id="dev-sequence-dropdown-element" onchange="devForceLoadQuestion(this.value)"></select>
    </div>

    <script>
        let todaysQuestionData = null;
        let currentQIdx = 0;
        let highestActiveClue = -1; 
        let questionIncorrectAttempts = 0;
        let activePanelTab = 'help'; 
        let isQuestionFinalized = false;
        let userFinalAnswerLabel = "";
        let finalStatusOutcome = ""; 
        let currentEarnedPoints = 100;
        let resolvedServerAnswerPayload = null;

        function getHistoricalUserStats() {
            let data = localStorage.getItem("td_user_stats_v1");
            if (!data) {
                return {
                    winStreak: 0,
                    maxStreak: 0,
                    totalGames: 0,
                    totalWins: 0,
                    distribution: [0, 0, 0, 0],
                    lastPlayedDayStamp: null,
                    lastDayResult: null,
                    lastUsedClues: 0
                };
            }
            try {
                return JSON.parse(data);
            } catch(e) {
                return {
                    winStreak: 0,
                    maxStreak: 0,
                    totalGames: 0,
                    totalWins: 0,
                    distribution: [0, 0, 0, 0],
                    lastPlayedDayStamp: null,
                    lastDayResult: null,
                    lastUsedClues: 0
                };
            }
        }

        function saveHistoricalUserStats(s) {
            localStorage.setItem("td_user_stats_v1", JSON.stringify(s));
        }

        function calculateCurrentAvailablePoints() {
            if (highestActiveClue === -1) return 100;
            let base = 100;
            if (highestActiveClue === 0) base = 60;
            if (highestActiveClue === 1) base = 40;
            if (highestActiveClue === 2) base = 20;
            if (questionIncorrectAttempts === 1) {
                base = Math.floor(base / 2);
            }
            return base;
        }

        function updateHeaderScoreDisplay(val) {
            document.getElementById("header-score-value").textContent = val;
        }

        function triggerScoreGlow(colorStyle) {
            const container = document.getElementById("game-border-element");
            const cls = (colorStyle === "green") ? "glow-green" : "glow-red";
            container.classList.remove("glow-green", "glow-red");
            void container.offsetWidth; 
            container.classList.add(cls);
            setTimeout(() => { container.classList.remove(cls); }, 1200);
        }

        function updateCountdownClockTimer() {
            const now = new Date();
            const tomorrow = new Date();
            tomorrow.setHours(24, 0, 0, 0);
            const diff = tomorrow - now;
            if (diff <= 0) {
                document.getElementById("game-timer-display").textContent = "00:00:00";
                return;
            }
            const hrs = String(Math.floor(diff / (1000 * 60 * 60))).padStart(2, '0');
            const mins = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            const secs = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
            document.getElementById("game-timer-display").textContent = `${hrs}:${mins}:${secs}`;
        }

        function toggleSandboxDevToolboxMenu() {
            const box = document.getElementById("dev-sandbox-element");
            if (box.style.display === "flex") {
                box.style.display = "none";
            } else {
                box.style.display = "flex";
                populateDevSandboxDropdownOptions();
            }
        }

        function populateDevSandboxDropdownOptions() {
            const select = document.getElementById("dev-sequence-dropdown-element");
            select.innerHTML = "";
            let defaultOpt = document.createElement("option");
            defaultOpt.value = "";
            defaultOpt.textContent = "-- Choose Variable Override --";
            select.appendChild(defaultOpt);

            for (let idx = 0; idx < 11; idx++) {
                let opt = document.createElement("option");
                opt.value = idx;
                opt.textContent = `Sequence ${idx + 1}`;
                if(localStorage.getItem("dev_force_q_index") == idx) opt.selected = true;
                select.appendChild(opt);
            }
        }

        function devResetTodayLockout() {
            let stats = getHistoricalUserStats();
            stats.lastPlayedDayStamp = null;
            stats.lastDayResult = null;
            stats.lastUsedClues = 0;
            saveHistoricalUserStats(stats);
            localStorage.removeItem("dev_force_q_index");
            localStorage.removeItem("td_today_score_cached");
            localStorage.removeItem("td_today_match_idx");
            localStorage.removeItem("td_midgame_active_clue");
            localStorage.removeItem("td_midgame_attempts");
            location.reload();
        }

        function devForceLoadQuestion(val) {
            if(val === \"\") {
                localStorage.removeItem("dev_force_q_index");
            } else {
                localStorage.setItem("dev_force_q_index", val);
            }
            localStorage.removeItem("td_midgame_active_clue");
            localStorage.removeItem("td_midgame_attempts");
            location.reload();
        }

        function getStaticBarGraphHtml(colorStyle) {
            let color = colorStyle || 'currentColor';
            return `
                <div class="bar-icon-wrapper">
                    <div class="bar-icon" style="height: 5px; background: ${color};"></div>
                    <div class="bar-icon" style="height: 11px; background: ${color};"></div>
                    <div class="bar-icon" style="height: 7px; background: ${color};"></div>
                </div>
            `;
        }

        function renderStaticBarGraphIcon() {
            const container = document.getElementById("bar-icon-container");
            container.innerHTML = getStaticBarGraphHtml(null);
        }

        function renderAbstractCardBackground() {
            const card = document.getElementById("card-3");
            card.innerHTML = `<span class="clue-placeholder">???</span>`;
            const qmConfig = [
                { top: "5%", left: "10%", size: "2.8rem", rot: "-15deg" },
                { top: "12%", left: "35%", size: "1.4rem", rot: "20deg" },
                { top: "8%", left: "68%", size: "2.1rem", rot: "-35deg" },
                { top: "32%", left: "15%", size: "1.9rem", rot: "45deg" },
                { top: "44%", left: "42%", size: "2.5rem", rot: "12deg" },
                { top: "28%", left: "80%", size: "1.6rem", rot: "-10deg" },
                { top: "70%", left: "8%", size: "2.2rem", rot: "30deg" },
                { top: "68%", left: "55%", size: "1.5rem", rot: "-25deg" },
                { top: "58%", left: "78%", size: "2.7rem", rot: "18deg" },
                { top: "48%", left: "22%", size: "1.2rem", rot: "-5deg" }
            ];
            qmConfig.forEach(cfg => {
                let qmSpan = document.createElement("div");
                qmSpan.className = "card-qm";
                qmSpan.style.top = cfg.top;
                qmSpan.style.left = cfg.left;
                qmSpan.style.fontSize = cfg.size;
                qmSpan.style.opacity = "0.35";
                qmSpan.style.transform = `rotate(${cfg.rot})`;
                qmSpan.textContent = "?";
                card.appendChild(qmSpan);
            });
        }

        function triggerManualReveal(clueIndex) {
            if (isQuestionFinalized) return;
            if (clueIndex !== highestActiveClue + 1) return;
            highestActiveClue = clueIndex;
            if (localStorage.getItem("dev_force_q_index") === null) {
                localStorage.setItem("td_midgame_active_clue", highestActiveClue);
            }
            currentEarnedPoints = calculateCurrentAvailablePoints();
            updateHeaderScoreDisplay(currentEarnedPoints);
            refreshUiLayout();
        }

        function handleInputBoxKeydown(e) {
            if (e.key === "Enter" && highestActiveClue !== -1) processGuess();
        }

        async function runGameInitialization() {
            renderStaticBarGraphIcon();
            renderAbstractCardBackground();
            updateCountdownClockTimer();
            setInterval(updateCountdownClockTimer, 1000);

            const stats = getHistoricalUserStats();
            const currentDayStamp = new Date().toDateString();
            const forcedParam = localStorage.getItem("dev_force_q_index") || "";
            const sessionForced = forcedParam !== "";

            let fetchUrl = `/api/game`;
            if (sessionForced) {
                fetchUrl += `?forcedIndex=${forcedParam}`;
            }

            if (stats.lastPlayedDayStamp === currentDayStamp && !sessionForced) {
                isQuestionFinalized = true;
                updateHeaderScoreDisplay(parseInt(localStorage.getItem("td_today_score_cached") || "0"));
                
                try {
                    // Fix 1: Append forcedParam if present under completion loading
                    let initUrl = `/api/game`;
                    if (forcedParam) initUrl += `?forcedIndex=${forcedParam}`;

                    const response = await fetch(initUrl, { headers: forcedParam !== "" ? { 'x-forced-index': forcedParam } : {} });
                    const data = await response.json();
                    currentQIdx = data.questionIndex;
                    todaysQuestionData = data.question;
                    
                    await fetchFullFinalAnswersData(forcedParam);

                    let savedMatchIdx = parseInt(localStorage.getItem("td_today_match_idx") || "0");
                    if (savedMatchIdx === 999) savedMatchIdx = 0;
                    let fallbackVal = resolvedServerAnswerPayload?.answers[savedMatchIdx] || resolvedServerAnswerPayload?.answers[0] || "Answered";
                    let targetAltText = todaysQuestionData?.alts[3] || "";
                    if (todaysQuestionData?.hasAlt && resolvedServerAnswerPayload?.answers) {
                        if (savedMatchIdx > 0 && todaysQuestionData.alts[0]) {
                            let cleanPrimary = resolvedServerAnswerPayload.answers[0];
                            targetAltText = `(or ${cleanPrimary})`;
                        }
                    }
                    finalizeCurrentQuestion(fallbackVal, stats.lastDayResult === "win" ? "win" : "lose", targetAltText);
                    switchPanelTab('answers');
                } catch(e) {
                    console.error("Initialization error under lockout conditions:", e);
                }
                return;
            }

            try {
                const response = await fetch(fetchUrl, { headers: forcedParam !== "" ? { 'x-forced-index': forcedParam } : {} });
                const data = await response.json();
                currentQIdx = data.questionIndex;
                todaysQuestionData = data.question;

                if (!sessionForced) {
                    let cachedClueState = localStorage.getItem("td_midgame_active_clue");
                    if (cachedClueState !== null) {
                        highestActiveClue = parseInt(cachedClueState);
                    } else {
                        highestActiveClue = -1;
                    }
                    let cachedAttempts = localStorage.getItem("td_midgame_attempts");
                    if (cachedAttempts !== null) {
                        questionIncorrectAttempts = parseInt(cachedAttempts);
                    } else {
                        questionIncorrectAttempts = 0;
                    }
                } else {
                    highestActiveClue = -1;
                    questionIncorrectAttempts = 0;
                }
            } catch (err) {
                console.error("Error connecting to backend sequence module API:", err);
                return;
            }

            isQuestionFinalized = false;
            currentEarnedPoints = calculateCurrentAvailablePoints();
            refreshUiLayout();
            switchPanelTab('help');
        }

        // Fix 3: Accept forcedParam argument in full answers lookup definition
        async function fetchFullFinalAnswersData(forcedParam) {
            let fetchUrl = `/api/game`;
            if (forcedParam) fetchUrl += `?forcedIndex=${forcedParam}`;
            
            const res = await fetch(fetchUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ guess: "####REVEAL_FORCE_STATE####" }) 
            });
            const data = await res.json();
            resolvedServerAnswerPayload = data;
        }

        function switchPanelTab(tabName) {
            if ((tabName === 'answers' || tabName === 'stats') && !isQuestionFinalized) {
                return;
            }
            activePanelTab = tabName;

            document.getElementById("help-toggle-action").classList.toggle("active-nav", tabName === 'help');
            document.getElementById("ans-toggle-action").classList.toggle("active-nav", tabName === 'answers');
            document.getElementById("stats-toggle-action").classList.toggle("active-nav", tabName === 'stats');

            const displayArea = document.getElementById("panel-content-area");

            if (tabName === 'help') {
                displayArea.innerHTML = `
                    <div class="feedback-title" id="fb-title">How To Play</div>
                    <div class="feedback-msg" id="fb-msg">Find the connection that joins the sequence and guess what comes 4th!</div>
                    <div style="display:flex; flex-direction:column; flex:1; justify-content:flex-start;">
                        <div class="section-header-pill">Rules</div>
                        <ul class="rules-bullet-list">
                            <li class="rules-bullet-item">Reveal clues sequentially to build the connection thread</li>
                            <li class="rules-bullet-item">Fewer clues revealed before a correct answer gives a higher final score</li>
                            <li class="rules-bullet-item"><span style="color:var(--purple-alt); font-weight:bold;">ALT</span> questions have multiple correct answers, sometimes alternative clues are shown to help but you only ever need to give one answer</li>
                            <li class="rules-bullet-item" style="font-weight: bold; color: var(--answer-highlight);">New sequence every 24 hours!</li>
                        </ul>
                    </div>
                `;
            } else if (tabName === 'answers') {
                let secondaryTextReveal = "";
                const answersArray = resolvedServerAnswerPayload?.answers || [userFinalAnswerLabel];
                const whyTextVal = resolvedServerAnswerPayload?.whyText || "Explanation securely verified by cloud.";

                if (todaysQuestionData?.hasAlt) {
                    let alternativesList = answersArray.filter(ans => ans.toLowerCase() !== userFinalAnswerLabel.toLowerCase());
                    if (currentQIdx === 7 && alternativesList.length === answersArray.length) {
                        alternativesList = ["Darren Anderton", "Darren Ambrose"];
                    }
                    if (alternativesList.length > 0) {
                        secondaryTextReveal = `Also ${alternativesList.join(', ')}`;
                    }
                }

                let statusTitle = (finalStatusOutcome === "win") ? "CONGRATULATIONS" : "UNLUCKY";
                let statusClass = (finalStatusOutcome === "win") ? "win" : "lose";
                let msgSummary = (finalStatusOutcome === "win") ? `Fantastic job! You earned ${currentEarnedPoints} points.` : "Better luck next time on the daily puzzle.";

                displayArea.innerHTML = `
                    <div class="feedback-title ${statusClass}">${statusTitle}</div>
                    <div class="feedback-msg" style="display:block;">${msgSummary}</div>
                    <div style="display:flex; flex-direction:column; margin-bottom: 2px;">
                        <div class="section-header-pill">Answer</div>
                        <div class="feedback-reveal-text">${userFinalAnswerLabel}</div>
                        <div class="feedback-secondary-reveal" style="display: ${secondaryTextReveal ? 'block' : 'none'};">${secondaryTextReveal}</div>
                    </div>
                    <div style="display:flex; flex-direction:column; margin-bottom: 2px;">
                        <div class="section-header-pill">Why</div>
                        <div id="fb-explanation-text">${whyTextVal}</div>
                    </div>
                    <button class="continue-stats-panel-btn" onclick="switchPanelTab('stats')">
                        Continue to Stats
                        ${getStaticBarGraphHtml('currentColor')}
                    </button>
                `;
            } else if (tabName === 'stats') {
                const stats = getHistoricalUserStats();
                let statusTitle = "STATISTICS";
                let statusClass = "summary";
                
                let outcomeSymbol = (stats.lastPlayedDayStamp === new Date().toDateString()) ? ((stats.lastDayResult === "win") ? "✅" : "❌") : "-";
                let todayPointsValue = (stats.lastPlayedDayStamp === new Date().toDateString()) ? (localStorage.getItem("td_today_score_cached") || "0") : "0";

                displayArea.innerHTML = `
                    <div class="feedback-title ${statusClass}">${statusTitle}</div>
                    <div class="stats-grid" id="today-stats-grid-element">
                        <div class="stat-box"><div class="stat-val">${outcomeSymbol}</div><div class="stat-lbl">Today</div></div>
                        <div class="stat-box"><div class="stat-val">${todayPointsValue}</div><div class="stat-lbl">Points</div></div>
                        <div class="stat-box"><div class="stat-val">${stats.winStreak}</div><div class="stat-lbl">Streak</div></div>
                        <div class="stat-box"><div class="stat-val">${stats.totalGames}</div><div class="stat-lbl">Played</div></div>
                        <div class="stat-box"><div class="stat-val">${stats.totalWins}</div><div class="stat-lbl">Wins</div></div>
                        <div class="stat-box"><div class="stat-val">${stats.maxStreak}</div><div class="stat-lbl">Max Strk</div></div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap: 4px; width:100%;">
                        <button class="share-btn" id="share-today-btn" onclick="generateShareClipboardString('today')">Copy Today's Result</button>
                        <button class="share-btn" id="share-alltime-btn" onclick="generateShareClipboardString('alltime')" style="background-color: var(--steel-blue);">Copy All-Time Stats</button>
                    </div>
                `;

                setTimeout(() => {
                    const grid = document.getElementById("today-stats-grid-element");
                    if (grid) {
                        const targetWidth = grid.offsetWidth;
                        document.getElementById("share-today-btn").style.width = targetWidth + "px";
                        document.getElementById("share-alltime-btn").style.width = targetWidth + "px";
                    }
                }, 1);
            }
        }

        function clearInputStateGlow() {
            const inputField = document.getElementById("game-input");
            if (inputField.classList.contains("state-incorrect") && questionIncorrectAttempts < 2) {
                inputField.classList.remove("state-incorrect");
                inputField.disabled = false;
                inputField.value = "";
                inputField.placeholder = "enter answer here";
                document.getElementById("submit-btn").disabled = false;
                inputField.focus();
            }
        }

        function refreshUiLayout() {
            if (!todaysQuestionData) return;
            const stats = getHistoricalUserStats();
            const currentDayStamp = new Date().toDateString();
            const sessionForced = localStorage.getItem("dev_force_q_index") !== null;

            if (stats.lastPlayedDayStamp === currentDayStamp && !sessionForced) {
                return;
            }

            const q = todaysQuestionData;
            document.getElementById("header-q-idx").textContent = `Sequence #${currentQIdx + 1}`;
            document.getElementById("alt-question-badge").style.display = q.hasAlt ? "inline-block" : "none";

            const isClueOneActive = (highestActiveClue >= 0);

            if (!isQuestionFinalized) {
                const inputField = document.getElementById("game-input");
                if (!inputField.classList.contains("state-incorrect")) {
                    inputField.disabled = !isClueOneActive;
                    if (!isClueOneActive) inputField.value = "";
                }
                document.getElementById("submit-btn").disabled = !isClueOneActive;
            }

            const hideBracketsUpfront = (currentQIdx === 7 || currentQIdx === 9 || !q.hasAlt);

            for (let i = 0; i < 4; i++) {
                const card = document.getElementById(`card-${i}`);
                if (i < 3) {
                    const btn = document.getElementById(`rev-btn-${i}`);
                    if (i <= highestActiveClue) {
                        card.className = "clue-card revealed";
                        let mainText = q.clues[i];
                        if (currentQIdx === 8) {
                            let parts = mainText.split(', ');
                            mainText = `${parts[0]}<span class="club-sub-line">${parts[1]}</span>`;
                        }
                        if (q.hasAlt && q.alts[i] && !hideBracketsUpfront) {
                            card.innerHTML = `<div class="hint-text-wrapper">${mainText}<br><span class="alt-clue-span">${q.alts[i]}</span></div>`;
                        } else {
                            card.innerHTML = `<div class="hint-text-wrapper">${mainText}</div>`;
                        }
                        if (btn) btn.disabled = true;
                    } else {
                        card.className = "clue-card";
                        card.innerHTML = `<span class="clue-placeholder">CLUE ${i + 1}</span>`;
                        if (btn) btn.disabled = (i !== highestActiveClue + 1);
                    }
                } else {
                    if (!isQuestionFinalized) {
                        card.className = "clue-card";
                        renderAbstractCardBackground();
                    }
                }
            }
        }

        async function processGuess() {
            if (isQuestionFinalized) return;
            const inputField = document.getElementById("game-input");
            const submitBtn = document.getElementById("submit-btn");
            const userGuess = inputField.value.trim();
            if (!userGuess) return;

            inputField.disabled = true;
            submitBtn.disabled = true;

            const forcedParam = localStorage.getItem("dev_force_q_index") || "";
            let apiEndpoint = "/api/game";
            if (forcedParam !== "") {
                apiEndpoint += `?forcedIndex=${forcedParam}`;
            }

            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-forced-index': forcedParam },
                    body: JSON.stringify({ guess: userGuess })
                });

                let serverResult;
                serverResult = await response.json();

                if (serverResult.correct) {
                    resolvedServerAnswerPayload = serverResult;
                    currentEarnedPoints = calculateCurrentAvailablePoints();
                    inputField.className = "card-input-element state-correct";
                    inputField.value = "CORRECT";
                    inputField.disabled = true;
                    if (submitBtn) submitBtn.disabled = true;

                    localStorage.setItem("td_today_match_idx", serverResult.matchIndex);
                    localStorage.removeItem("td_midgame_active_clue");
                    localStorage.removeItem("td_midgame_attempts");

                    let targetAltText = todaysQuestionData.alts[3] || "";
                    if (todaysQuestionData?.hasAlt && serverResult.matchIndex > 0 && serverResult.answers) {
                        let cleanPrimary = serverResult.answers[0];
                        targetAltText = `(or ${cleanPrimary})`;
                    }

                    commitResultsToPersistentCookies(true, currentEarnedPoints);
                    finalizeCurrentQuestion(serverResult.primaryAnswer, "win", targetAltText);
                    switchPanelTab('answers');
                } else {
                    questionIncorrectAttempts++;
                    if (localStorage.getItem("dev_force_q_index") === null) {
                        localStorage.setItem("td_midgame_attempts", questionIncorrectAttempts);
                    }
                    triggerScoreGlow("red");

                    if (questionIncorrectAttempts < 2) {
                        inputField.className = "card-input-element state-incorrect";
                        inputField.value = "INCORRECT";
                        updateHeaderScoreDisplay(calculateCurrentAvailablePoints());

                        document.getElementById("fb-title").textContent = "Incorrect Attempt";
                        document.getElementById("fb-title").className = "feedback-title alert";
                        document.getElementById("fb-msg").innerHTML = "Your score has been halved and you have one attempt remaining. Click or type anywhere to retry.";
                    } else {
                        currentEarnedPoints = 0;
                        
                        // Fix 2: Pass forcedParam here to keep developer state safe on termination fail loops
                        await fetchFullFinalAnswersData(forcedParam);

                        localStorage.setItem("td_today_match_idx", "0");
                        localStorage.removeItem("td_midgame_active_clue");
                        localStorage.removeItem("td_midgame_attempts");

                        let fallbackLabel = resolvedServerAnswerPayload?.answers[0] || "Unknown";
                        let defaultFailSubtext = todaysQuestionData?.hasAlt ? todaysQuestionData?.alts[3] || "" : "";

                        inputField.className = "card-input-element state-incorrect";
                        inputField.value = "INCORRECT";
                        inputField.disabled = true;
                        if (submitBtn) submitBtn.disabled = true;

                        commitResultsToPersistentCookies(false, 0);
                        finalizeCurrentQuestion(fallbackLabel, "lose", defaultFailSubtext);
                        switchPanelTab('answers');
                    }
                }
            } catch(e) {
                console.error("Cloud validation connection error:", e);
            }
        }

        function commitResultsToPersistentCookies(isWin, pointsScored) {
            let stats = getHistoricalUserStats();
            const todayStamp = new Date().toDateString();
            const yesterdayStamp = new Date(Date.now() - 86400000).toDateString();

            if (stats.lastPlayedDayStamp === todayStamp) return;

            localStorage.setItem("td_today_score_cached", pointsScored);
            stats.lastPlayedDayStamp = todayStamp;
            stats.lastDayResult = isWin ? "win" : "lose";
            stats.lastUsedClues = highestActiveClue + 1;
            stats.totalGames++;

            if (isWin) {
                stats.totalWins++;
                if (stats.lastPlayedDayStamp === yesterdayStamp || stats.lastPlayedDayStamp === null || stats.winStreak === 0) {
                    stats.winStreak++;
                } else {
                    stats.winStreak = 1;
                }
                if (stats.winStreak > stats.maxStreak) {
                    stats.maxStreak = stats.winStreak;
                }
                let distIndex = highestActiveClue + 1; 
                if (distIndex >= 0 && distIndex <= 3) {
                    stats.distribution[distIndex]++;
                }
            } else {
                stats.winStreak = 0;
            }

            saveHistoricalUserStats(stats);
        }

        function finalizeCurrentQuestion(primaryLabelToDisplay, winLoseStatus, structuralCardAltText) {
            isQuestionFinalized = true;
            userFinalAnswerLabel = primaryLabelToDisplay;
            finalStatusOutcome = winLoseStatus;

            document.getElementById("ans-toggle-action").disabled = false;
            document.getElementById("stats-toggle-action").disabled = false;

            updateHeaderScoreDisplay(parseInt(localStorage.getItem("td_today_score_cached") || "0"));

            const card = document.getElementById("card-3");
            card.className = "clue-card revealed";
            if (winLoseStatus === "win") {
                card.style.borderColor = "var(--success-green)";
                card.style.boxShadow = "0 0 15px rgba(16, 185, 129, 0.4)";
            } else {
                card.style.borderColor = "var(--alert-red)";
                card.style.boxShadow = "0 0 15px rgba(239, 68, 68, 0.4)";
            }

            let labelText = primaryLabelToDisplay;
            let explanationMetric = "?";

            for (let i = 0; i < 4; i++) {
                const targetCard = document.getElementById(`card-${i}`);
                targetCard.className = "clue-card revealed";
                const btn = document.getElementById(`rev-btn-${i}`);
                if (btn) btn.disabled = true;

                let cardText = (i === 3) ? primaryLabelToDisplay : todaysQuestionData.clues[i];
                if (currentQIdx === 8) {
                    let parts = cardText.split(', ');
                    if (parts.length > 1) cardText = `${parts[0]}<span class="club-sub-line">${parts[1]}</span>`;
                    else if (i === 3) cardText = primaryLabelToDisplay.toLowerCase().includes("januzaj") ? "Adnan Januzaj<span class=\"club-sub-line\">Manchester United</span>" : "Kostas Manolas<span class=\"club-sub-line\">Roma</span>";
                }
                if (currentQIdx === 7 && i === 3) {
                    const words = primaryLabelToDisplay.split(' ');
                    if (words.length >= 2) explanationMetric = `${words[0].charAt(0).toUpperCase()}${words[words.length - 1].charAt(0).toUpperCase()}`;
                } else if (todaysQuestionData.counts && todaysQuestionData.counts[i]) {
                    explanationMetric = todaysQuestionData.counts[i];
                }

                let displayBracketText = `[${explanationMetric}]`;
                if (i === 3 && structuralCardAltText) {
                    card.innerHTML = `<div class="hint-text-wrapper">${cardText}<br><span class="alt-clue-span">${structuralCardAltText}</span></div><div class="card-inline-metric">${displayBracketText}</div>`;
                } else {
                    let altTextHtml = (todaysQuestionData.hasAlt && todaysQuestionData.alts[i]) ? `<br><span class="alt-clue-span">${todaysQuestionData.alts[i]}</span>` : "";
                    targetCard.innerHTML = `<div class="hint-text-wrapper">${cardText}${altTextHtml}</div><div class="card-inline-metric">${displayBracketText}</div>`;
                }
            }

            const inputField = document.getElementById("game-input");
            if (winLoseStatus === "win") {
                inputField.className = "card-input-element state-correct";
                inputField.value = "CORRECT";
            } else {
                inputField.className = "card-input-element state-incorrect";
                inputField.value = "INCORRECT";
            }
            inputField.disabled = true;
            const submitBtn = document.getElementById("submit-btn");
            if (submitBtn) submitBtn.disabled = true;
        }

        function generateShareClipboardString(type) {
            const stats = getHistoricalUserStats();
            let text = "";
            if (type === 'today') {
                let puzzleNum = currentQIdx + 1;
                let score = localStorage.getItem("td_today_score_cached") || "0";
                let resultSym = (stats.lastDayResult === "win") ? "🎉" : "❌";
                let cluesCount = stats.lastUsedClues;
                text = `Toney Dudek Sequences - Puzzle #${puzzleNum}\nResult: ${resultSym}\nClues Revealed: ${cluesCount}/4\nPoints: ${score}\nPlay here: ${window.location.origin}`;
            } else {
                text = `Toney Dudek Sequences - All-Time Stats\nGames Played: ${stats.totalGames}\nTotal Wins: ${stats.totalWins}\nCurrent Streak: ${stats.winStreak}\nMax Streak: ${stats.maxStreak}\nPlay here: ${window.location.origin}`;
            }
            navigator.clipboard.writeText(text).then(() => {
                alert("Stats copied to clipboard!");
            }).catch(err => {
                console.error("Failed to copy text: ", err);
            });
        }

        window.onload = runGameInitialization;
    </script>
</body>
